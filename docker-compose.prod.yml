# docker-compose.prod.yml — «production-like» стек RegionLens для локальной демонстрации
# и развёртывания на своём сервере (VPS): nginx + приложение (gunicorn) + PostgreSQL + Redis
# + Prometheus + Grafana. Точка входа — nginx на порту 8080.
#
# Запуск:  docker compose -f docker-compose.prod.yml up -d --build
# Секреты (пароли, ключ) задаются переменными окружения; значения по умолчанию — только для локали.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: regionlens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regionlens}
      POSTGRES_DB: regionlens
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regionlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    # Миграции и демо-данные применяются при старте, затем поднимается gunicorn.
    command: >
      sh -c "python backend/manage.py migrate --no-input &&
             python backend/manage.py seed_demo &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-to-a-long-random-string}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgres://regionlens:${POSTGRES_PASSWORD:-regionlens}@postgres:5432/regionlens
      REDIS_URL: redis://redis:6379/0
      DUCKDB_PATH: /app/data/regionlens.duckdb
      # Приложение за TLS-терминирующим прокси — доверяет X-Forwarded-Proto.
      DJANGO_TRUST_PROXY_SSL: "true"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata: {}
  redisdata: {}
  promdata: {}
  grafanadata: {}
