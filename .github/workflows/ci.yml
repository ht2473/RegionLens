name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # Ф1+: ставим и группу pipeline (pipeline-модули импортируют pandera и пр.).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pipeline,backend,dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format)
        run: ruff format --check .
      - name: Mypy
        run: mypy pipeline backend
      - name: Pytest
        run: pytest
