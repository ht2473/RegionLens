name: CI

# Триггеры запуска: push в ветку main и любой pull request. Push в прочие ветки
# отдельно не проверяется — соответствующее покрытие обеспечивает проверка их
# pull request, что сокращает число прогонов без потери контроля качества.
on:
  push:
    branches: [main]
  pull_request:

# Ограничение параллелизма: новый прогон для той же ветки или pull request
# отменяет предыдущий незавершённый, экономя время раннеров.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        # Устанавливаются группы зависимостей pipeline, backend и dev. Группа
        # pipeline обязательна и для прогона тестов: её модули импортируют pandera
        # и другие библиотеки конвейера обработки данных.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pipeline,backend,dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format)
        run: ruff format --check .
      - name: Mypy
        run: mypy pipeline backend
      - name: OpenAPI (schema lint)
        # Валидация сгенерированной OpenAPI-схемы: выявляет ошибки генерации
        # и расхождения между фактическими эндпоинтами и их описанием в схеме.
        run: PYTHONPATH=backend:. python backend/manage.py spectacular --validate --fail-on-warn --file /tmp/schema.yml
      - name: Pytest
        run: pytest
