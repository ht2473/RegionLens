name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # На Ф0 достаточно backend+dev (быстро). Группа pipeline добавится в install,
        # когда появятся модули конвейера, требующие ML-зависимостей (Ф1+).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[backend,dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format)
        run: ruff format --check .
      - name: Mypy
        run: mypy pipeline backend
      - name: Pytest
        run: pytest
