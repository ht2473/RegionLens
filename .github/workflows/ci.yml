name: CI

# Триггеры запуска: push в ветку main и любой pull request. Push в прочие ветки
# отдельно не проверяется — соответствующее покрытие обеспечивает проверка их
# pull request, что сокращает число прогонов без потери контроля качества.
on:
  push:
    branches: [main]
  pull_request:

# Ограничение параллелизма: новый прогон для той же ветки или pull request
# отменяет предыдущий незавершённый, экономя время раннеров.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        # Устанавливаются группы зависимостей pipeline, backend и dev. Группа
        # pipeline обязательна и для прогона тестов: её модули импортируют pandera
        # и другие библиотеки конвейера обработки данных.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pipeline,backend,dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format)
        run: ruff format --check .
      - name: Mypy
        run: mypy pipeline backend
      - name: OpenAPI (schema lint)
        # Валидация сгенерированной OpenAPI-схемы: выявляет ошибки генерации
        # и расхождения между фактическими эндпоинтами и их описанием в схеме.
        run: PYTHONPATH=backend:. python backend/manage.py spectacular --validate --fail-on-warn --file /tmp/schema.yml
      - name: Pytest
        # Прогон тестов с измерением покрытия; порог 85% — гейт качества.
        run: pytest --cov=core --cov=config --cov=pipeline --cov-report=term-missing --cov-fail-under=85

  e2e:
    # Браузерные сценарии (Playwright): проверяют рендер и поведение страниц, невидимые
    # для серверных тестов, — горячие клавиши, геометрию шапки, тему карт, панель
    # экспорта графиков. Живому серверу достаточно backend-зависимостей: коллекция
    # ограничена tests/e2e и не импортирует модули конвейера.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Витрина data/regionlens.duckdb хранится в Git LFS; checkout по умолчанию оставляет
      # вместо неё текстовый указатель, и все API-запросы падают с «not a valid DuckDB
      # database file». Объекты LFS кэшируются по их идентификаторам: сетевая загрузка
      # (и квота LFS-трафика GitHub) расходуется только при фактической смене витрины.
      - name: Ключ кэша LFS
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-ids
      - name: Кэш объектов LFS
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-ids') }}
      - name: Загрузка витрины DuckDB (Git LFS)
        run: git lfs pull
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[backend,dev]"
      - name: Playwright browsers
        # --with-deps ставит системные библиотеки chromium на раннере Ubuntu.
        run: python -m playwright install --with-deps chromium
      - name: E2E
        run: pytest tests/e2e -m e2e --browser chromium

  js:
    # Юнит-тесты клиентского JavaScript (vitest, окружение jsdom). Отдельный лёгкий job:
    # не требует Python, витрины DuckDB и браузеров — только Node. Проверяет чистые
    # функции фронтенда (rl-common.js), на которые опираются карты и графики.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # npm ci ставит зависимости строго по package-lock.json — воспроизводимо и без
      # обновления версий на раннере.
      - name: Install
        run: npm ci
      - name: Vitest
        run: npm test
