name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # Ф1+: ставим и группу pipeline (pipeline-модули импортируют pandera и пр.).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pipeline,backend,dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format)
        run: ruff format --check .
      - name: Mypy
        run: mypy pipeline backend
      - name: OpenAPI (schema lint)
        # Линт OpenAPI-схемы ловит битую
        # генерацию и расхождение эндпойнтов со схемой.
        run: PYTHONPATH=backend:. python backend/manage.py spectacular --validate --fail-on-warn --file /tmp/schema.yml
      - name: Pytest
        run: pytest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Audit (pip-audit)
        # Аудит зависимостей информационный до Фазы 5 (где он станет настоящим гейтом с политикой
        # фиксов/SBOM). continue-on-error: новые CVE в транзитивных пакетах (mlflow/dvc-тулинг, вне
        # веб-surface) не блокируют несвязанную работу. Политика — чинить, а не подавлять: поднимать
        # пакеты до фикс-версий и пересобирать uv.lock. diskcache CVE-2025-69872 — без фикса, подавлен.
        continue-on-error: true
        run: pip-audit -r requirements.txt --no-deps --ignore-vuln CVE-2025-69872
