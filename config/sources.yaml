# Реестр источников данных. Каждый источник -> свой адаптер (SourceAdapter).
# Точка роста: новый источник = новый адаптер + запись здесь, без правки ETL.
sources:
  - id: rosstat_collection_102
    adapter: pipeline.ingestion.rosstat_collection.RosstatCollectionAdapter
    path: data/raw/data_regions_collection_102_v20260313.parquet
    license: "CC BY 4.0"
    note: "Росстат / портал «Если быть точным». Формат long, 14 колонок."
    # Коды «нет данных» в indicator_value (это не числа, а заглушки). Зануляем при
    # чтении, иначе завышают покрытие и портят z-score/гармонизацию/графики рядов.
    na_values: [-99999999, -77777777]
