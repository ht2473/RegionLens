# Гиперпараметры аналитики (без хардкода в коде). Разделы наполняются по фазам.
window: {start: 2010, end: 2024}     # окно анализа (типология/индекс/переходы)
coverage_threshold: 0.80              # Ф2: порог покрытия метрики
corr_threshold: 0.95                  # Ф2: порог удаления коллинеарных метрик
impute_max_gap: 2                     # Ф2: макс. длина подряд импутируемых точек
impute_share_max: 0.15                # Ф2: макс. доля импутаций (pandera-гейт)
clustering: {k_range: [3, 8], chosen_k: 3, seed: 42, algo: kmeans}   # Ф3 (chosen_k зафиксирован)
trajectory: {leap_gap: 2, volatile_changes: 3}                           # Ф5
forecasting:                                                             # Ф8
  horizon: 2
  lags: [1, 2, 3]
  min_train: 5
  alpha: 0.1
  models: [naive, ets, theta, global_gbm]
anomalies:                                     # Ф9
  contamination: 0.05      # доля пространственных выбросов (IsolationForest)
  ruptures_model: l2       # стоимость сегментации Binseg (l2 — сдвиг среднего)
  min_series_len: 8        # мин. длина ряда для поиска структурного сдвига
  max_break_ratio: 0.5     # порог: остаток ступени ≤ доля остатка линейного тренда (отсекает тренды/шум)
twins: {top_n: 5}                                                         # C2: число двойников на регион-год
