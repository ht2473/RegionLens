# config/indicators.yaml — домены и курируемое ядро метрик (Ф2 / S3).
# Отобрано на ОЧИЩЕННОМ от заглушек дампе (окно 2010-2024): покрытие и
# доля заглушек (sent_share) проверены поштучно.
#
# population_metric_id — знаменатель подушевой гармонизации (value_type=absolute -> /pop).
population_metric_id: 1781   # Среднегодовая численность населения (тыс. чел.)

# Раздел -> домен. Грубый классификатор для ХВОСТА (не-ядро) и отчётов покрытия;
# для метрик ядра домен берётся из блока core ниже (приоритетнее). Неперечисленные
# разделы (цены/тарифы, экология, преступность, нишевые услуги и т.п.) -> default_domain.
default_domain: excluded
domains:
