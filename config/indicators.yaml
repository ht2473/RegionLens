  "Образование": health_edu
  "Подготовка кадров": health_edu

# Курируемое ядро (~30-50 метрик). value_type/higher_is_better проставлены вручную:
#   absolute  -> делится на население при гармонизации (value_harmonized);
#   per_capita-> уже подушевое / на 1000 / на 10000 / на 100000 населения (без деления);
#   share     -> процент/удельный вес (без деления);
#   index     -> готовый сопоставимый уровень/коэффициент, НЕ нормированный на
#                численность (лет, на 1 женщину, на 1000 трудосп., плотность) (без деления).
core:
