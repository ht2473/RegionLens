  "Денежные доходы населения и их использование": income
  "Расходы и потребление домашних хозяйств": income
  "Дифференциация доходов и бедность": income
  "Социальная защита": income
  "Уровень благосостояния, социальное обеспечение и социальная помощь": income
  # --- labor ---
  "Труд": labor
  "Участие в рабочей силе, занятость и безработица": labor
  "Занятые": labor
  "Безработные": labor
  "Рабочая сила": labor
  "Население, не входящее в состав рабочей силы": labor
  "Занятость и безработица": labor
  "Занятость, безработица и заработная плата": labor
  "Затраты на рабочую силу, заработная плата работников": labor
  "Условия труда, производственный травматизм": labor
  # --- demography ---
  "Население": demography
  "Численность населения": demography
  "Демографическая ситуация": demography
  "Миграция": demography
  "Рождаемость": demography
  # --- infrastructure ---
  "Строительство": infrastructure
  "Строительные организации": infrastructure
  "Жилищное и социально-культурное строительство": infrastructure
  "Состояние жилищного фонда": infrastructure
  "Жилищные условия населения": infrastructure
  "Жилищные условия": infrastructure
