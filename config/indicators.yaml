  "Валовой региональный продукт": economy
  "Инвестиции в основной капитал": economy
  "Инвестиции": economy
  "Результаты инвестиционной деятельности": economy
  "Основные фонды": economy
  "Основные фонды и инвестиции в основной капитал": economy
