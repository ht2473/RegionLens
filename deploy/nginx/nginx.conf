# deploy/nginx/nginx.conf — обратный прокси перед gunicorn-приложением.
# Статику отдаёт само приложение (WhiteNoise), поэтому nginx только проксирует запросы.

upstream regionlens_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # Запас на выгрузки/экспорт.
    client_max_body_size 20m;

    # Метрики Prometheus наружу не отдает: их собирает Prometheus напрямую внутри сети.
    location = /metrics {
        return 403;
    }

    location / {
        proxy_pass http://regionlens_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
